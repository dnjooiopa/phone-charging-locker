name: Unit Test

on:
  push:
    branches: ["main"]

jobs:
  run_unit_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"

      - name: Install dependencies
        run: go mod download

      - name: Test with the Go CLI
        run: go test -v ./...
